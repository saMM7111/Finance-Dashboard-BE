openapi: 3.0.1
info:
  title: Financle Dashboard API
  description: |

    ## RBAC Matrix

    | Area | ADMIN | ANALYST | USER |
    | --- | --- | --- | --- |
    | Users | Full management | No access | Self only for read, update, delete |
    | Accounts | Full management | No access | Own accounts only |
    | Records | Full read and write | Read all records only | Own records only |
    | Categories | Full management + analytic | Read categories + analytic | Read categories + own analytic |
    | Analytics and Summaries | Access any user | Access any user | Own data only |

    Notes:
    - ANALYST is read-only and cannot create, update, or delete users, accounts, records, or categories.
    - Authorities are stored as raw role names: ADMIN, ANALYST, USER.
  contact:
    name: Sankalp Mehta
    email: sammehta1000@gmail.com
  version: "1.0"
servers:
  - url: http://localhost:8000/api
    description: Generated server url
tags:
  - name: Category
    description: Category of record.
  - name: Account
    description: Financial account
  - name: Authentication
    description: Authentication and registration
  - name: User
    description: User information
  - name: Record
    description: Record of financial transaction
paths:
  /users/{id}:
    get:
      tags:
        - User
      summary: Return user by id.
      description: Role ADMIN can get all users. Role USER can get only self. Role ANALYST has no access.
      operationId: getById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden. Insufficient permissions for this operation.
        "401":
          description: Unauthorized. Authentication is required.
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      security:
        - bearer-key: []
    put:
      tags:
        - User
      summary: Update user by id.
      description: "Update existing user by id, null or not provided fields are ignored. Role ADMIN can update all users and can set role ADMIN or ANALYST to all users. Role USER can update only self and can't set role ADMIN or ANALYST. Role ANALYST has no access."
      operationId: update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden. Insufficient permissions for this operation.
        "401":
          description: Unauthorized. Authentication is required.
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      security:
        - bearer-key: []
    delete:
      tags:
        - User
      summary: Delete user by id.
      description: All accounts and records of this user are also deleted. Role ADMIN can delete all users. Role USER can delete only self. Role ANALYST has no access.
      operationId: deleteById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden. Insufficient permissions for this operation.
        "401":
          description: Unauthorized. Authentication is required.
        "200":
          description: OK
      security:
        - bearer-key: []
